services:
  - type: web
    name: warehouse-lms
    runtime: node
    region: oregon          # change to: oregon | frankfurt | singapore | ohio
    plan: starter           # starter = $7/mo (needed for persistent disk)
    buildCommand: "cd server && npm install && cd ../client && npm install && npm run build"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value

    disk:
      name: lms-data
      mountPath: /var/data   # SQLite DB will live here
      sizeGB: 1
