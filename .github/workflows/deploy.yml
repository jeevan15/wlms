name: Deploy to Render

on:
  push:
    branches:
      - main          # trigger on every push to main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # ── 3. Install & build (catches errors before Render does) ─────────────
      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Install client dependencies
        run: npm install
        working-directory: client

      - name: Build React frontend
        run: npm run build
        working-directory: client

      # ── 4. Trigger Render deploy hook ───────────────────────────────────────
      #    Store your Deploy Hook URL in:
      #    GitHub repo → Settings → Secrets → Actions → RENDER_DEPLOY_HOOK_URL
      - name: Trigger Render deploy
        run: |
          curl -s --fail-with-body \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null
          echo "✅ Deploy triggered on Render"
